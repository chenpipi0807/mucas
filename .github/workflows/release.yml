name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,  target: x86_64-unknown-linux-musl,   ext: ""     }
          - { os: macos-14,      target: aarch64-apple-darwin,         ext: ""     }
          - { os: windows-2022,  target: x86_64-pc-windows-msvc,       ext: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl libc for fully-static Linux binary
      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mucas-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('mucas-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Run tests
        working-directory: mucas-rs
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build release binary
        working-directory: mucas-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="mucas-rs/target/${{ matrix.target }}/release/mucas${{ matrix.ext }}"
          DST="mucas-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$DST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mucas-${{ matrix.target }}
          path: mucas-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate icon (rsvg-convert + ImageMagick)
        run: |
          sudo apt-get install -y librsvg2-bin imagemagick
          for size in 16 32 48 256; do
            rsvg-convert -w $size -h $size assets/mucas.svg -o /tmp/mucas_${size}.png
          done
          convert /tmp/mucas_16.png /tmp/mucas_32.png /tmp/mucas_48.png /tmp/mucas_256.png assets/mucas.ico

      - name: Bundle platform installers
        run: |
          # Windows
          cp dist/mucas-x86_64-pc-windows-msvc/mucas-x86_64-pc-windows-msvc.exe installers/windows/mucas.exe
          cp assets/mucas.ico installers/windows/mucas.ico
          cd installers/windows && zip -r ../../dist/mucas-install-windows.zip . && cd ../..

          # macOS (Apple Silicon only — Intel Mac dropped in v0.12.1)
          cp dist/mucas-aarch64-apple-darwin/mucas-aarch64-apple-darwin installers/macos/mucas
          chmod +x installers/macos/mucas
          cd installers/macos && zip -r ../../dist/mucas-install-macos.zip . && cd ../..

          # Linux
          cp dist/mucas-x86_64-unknown-linux-musl/mucas-x86_64-unknown-linux-musl installers/linux/mucas
          chmod +x installers/linux/mucas
          cd installers/linux && zip -r ../../dist/mucas-install-linux.zip . && cd ../..

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/mucas-install-windows.zip
            dist/mucas-install-macos.zip
            dist/mucas-install-linux.zip
            dist/**/*
          generate_release_notes: true
          body: |
            ## μCAS ${{ github.ref_name }}

            ### Easy Install (recommended)

            | Platform | Download | Steps |
            |----------|----------|-------|
            | **Windows** | `mucas-install-windows.zip` | Extract → double-click `install.bat` |
            | **macOS**   | `mucas-install-macos.zip`   | Extract → run `./install.sh` in Terminal |
            | **Linux**   | `mucas-install-linux.zip`   | Extract → run `./install.sh` in Terminal |

            After installing: right-click any folder → **"Pack with μCAS"**, right-click any `.mcar` → **"Unpack here"**.

            ### Raw binaries (CLI / advanced)

            | Platform | File |
            |----------|------|
            | Linux x86_64 (static) | `mucas-x86_64-unknown-linux-musl` |
            | macOS Apple Silicon   | `mucas-aarch64-apple-darwin` |
            | Windows x86_64        | `mucas-x86_64-pc-windows-msvc.exe` |

            ### Quick start (CLI)

            ```sh
            mucas pack    my_folder/    -o archive.mcar
            mucas unpack  archive.mcar  -o restored/
            mucas list    archive.mcar
            mucas check   archive.mcar
            ```
