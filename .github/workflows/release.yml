name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,  target: x86_64-unknown-linux-musl,   ext: ""     }
          - { os: macos-13,      target: x86_64-apple-darwin,          ext: ""     }
          - { os: macos-14,      target: aarch64-apple-darwin,         ext: ""     }
          - { os: windows-2022,  target: x86_64-pc-windows-msvc,       ext: ".exe" }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # musl libc for fully-static Linux binary
      - name: Install musl tools (Linux only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            mucas-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('mucas-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Run tests
        working-directory: mucas-rs
        run: cargo test --release --target ${{ matrix.target }}

      - name: Build release binary
        working-directory: mucas-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          SRC="mucas-rs/target/${{ matrix.target }}/release/mucas${{ matrix.ext }}"
          DST="mucas-${{ matrix.target }}${{ matrix.ext }}"
          cp "$SRC" "$DST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mucas-${{ matrix.target }}
          path: mucas-${{ matrix.target }}${{ matrix.ext }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          generate_release_notes: true
          body: |
            ## μCAS ${{ github.ref_name }}

            Download the binary for your platform:

            | Platform | File |
            |----------|------|
            | Linux x86_64 (static) | `mucas-x86_64-unknown-linux-musl` |
            | macOS Intel           | `mucas-x86_64-apple-darwin` |
            | macOS Apple Silicon   | `mucas-aarch64-apple-darwin` |
            | Windows x86_64        | `mucas-x86_64-pc-windows-msvc.exe` |

            ### Quick start

            ```sh
            # Pack a directory
            mucas pack my_folder/ -o archive.mcar

            # Unpack
            mucas unpack archive.mcar -o restored/

            # List contents
            mucas list archive.mcar

            # Verify integrity
            mucas check archive.mcar
            ```
